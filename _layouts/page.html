<!doctype html>
<!--[if lt IE 7]><html class="no-js lt-ie9 lt-ie8 lt-ie7" lang="en"> <![endif]-->
<!--[if (IE 7)&!(IEMobile)]><html class="no-js lt-ie9 lt-ie8" lang="en"><![endif]-->
<!--[if (IE 8)&!(IEMobile)]><html class="no-js lt-ie9" lang="en"><![endif]-->
<!--[if gt IE 8]><!--> <html class="no-js" lang="en"><!--<![endif]-->

<head>
{% include head.html %}
</head>


<body class="page" itemscope itemtype="http://schema.org/WebPage">

{% include chrome-frame.html %}

{% include navigation.html %}

{% if page.image.feature %}<div class="image-wrap">
  <img src="{{ site.url }}/images/{{ page.image.feature }}" alt="{{ page.title }} feature image" itemprop="primaryImageOfPage">
</div><!-- /.image-wrap -->{% endif %}

<div id="main" role="main"  itemprop="mainContentOfPage">
  <div class="article-author-top">
    {% include author-bio.html %}
  </div>
  <article itemscope itemtype="http://schema.org/CreativeWork">
  {% comment %}
    <div class="headline-wrap">
      <h1 itemprop="headline">{{ page.title }}</h1>
    </div><!--/ .headline-wrap -->
  {% endcomment %}
    <div class="article-wrap" itemprop="text">
      {{ content }}
    </div><!-- /.article-wrap -->
  </article>
</div><!-- /#index -->

<div class="footer-wrap">
  <footer>
    {% include footer.html %}
  </footer>
</div><!-- /.footer-wrap -->

{% include scripts.html %}

<script>
// Scroll-reveal (IntersectionObserver progressive enhancement)
(function(){
  if (!('IntersectionObserver' in window)) return;
  document.documentElement.classList.add('js-loaded');
  var targets = document.querySelectorAll('.blk-v2, .hero-v2, .contact-v2');
  var obs = new IntersectionObserver(function(entries){
    entries.forEach(function(entry){
      if (entry.isIntersecting){
        entry.target.classList.add('is-visible');
        obs.unobserve(entry.target);
      }
    });
  }, {threshold: 0.05});
  targets.forEach(function(el){ obs.observe(el); });
})();

// Scroll progress bar
(function(){
  var bar = document.createElement('div');
  bar.className = 'scroll-progress';
  document.body.prepend(bar);
  window.addEventListener('scroll', function(){
    var h = document.documentElement;
    var pct = h.scrollTop / (h.scrollHeight - h.clientHeight) * 100;
    bar.style.width = Math.min(pct, 100) + '%';
  }, {passive: true});
})();

// Sliding nav underline indicator
(function(){
  var wrapper = document.querySelector('.navigation-wrapper');
  var current = document.querySelector('.top-navigation-current');
  if (!wrapper || !current) return;
  var ind = document.createElement('div');
  ind.className = 'nav-indicator';
  wrapper.appendChild(ind);
  function pos(el){
    var wr = wrapper.getBoundingClientRect(), er = el.getBoundingClientRect();
    ind.style.left = (er.left - wr.left) + 'px';
    ind.style.width = er.width + 'px';
  }
  // Set initial position without animation, then enable transition
  pos(current);
  requestAnimationFrame(function(){
    requestAnimationFrame(function(){
      ind.style.transition = 'left .22s cubic-bezier(0.16,1,0.3,1), width .22s cubic-bezier(0.16,1,0.3,1)';
    });
  });
  document.querySelectorAll('.top-navigation a').forEach(function(a){
    a.addEventListener('mouseenter', function(){ pos(a); });
    a.addEventListener('mouseleave', function(){ pos(current); });
  });
})();
</script>

</body>
</html>
